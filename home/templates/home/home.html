{% extends "base.html" %}


{% block title %} Home {% endblock  %}


{% block content %}
    <h3 class="text-center" >Index Page</h3>

    <div class="card mx-auto" style="max-width: 600px; padding: 20px; margin: 20px;">
        {% for post in posts %}
            <a href="{{ post.get_absolute_url }}">
                {{ post.title }}
            </a>
        {% endfor %}
    </div>
{% endblock %}
